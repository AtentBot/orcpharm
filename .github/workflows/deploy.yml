name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: atentbot/orcpharm

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore orcpharm.Tests/orcpharm.Tests.csproj

      - name: Test
        run: dotnet test orcpharm.Tests/orcpharm.Tests.csproj --no-restore --configuration Release --verbosity normal

  build-and-push:
    name: Build & push image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets presence
        env:
          USER_PRESENT: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          TOKEN_PRESENT: ${{ secrets.DOCKERHUB_TOKEN != '' }}
          WEBHOOK_PRESENT: ${{ secrets.PORTAINER_WEBHOOK_URL != '' }}
        run: |
          echo "DOCKERHUB_USERNAME present: $USER_PRESENT"
          echo "DOCKERHUB_TOKEN present:    $TOKEN_PRESENT"
          echo "PORTAINER_WEBHOOK_URL present: $WEBHOOK_PRESENT"
          if [ "$USER_PRESENT" != "true" ] || [ "$TOKEN_PRESENT" != "true" ]; then
            echo "::error::Docker Hub secrets ausentes — verifique Settings → Secrets → Actions"
            exit 1
          fi

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./orcpharm
          file: ./orcpharm/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Portainer redeploy
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Call Portainer service webhook
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 5 \
            -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
          echo "Redeploy triggered for sha-${{ needs.build-and-push.outputs.sha_short }}"
