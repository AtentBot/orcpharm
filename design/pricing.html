<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>OrcPharm — Preços</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>@import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap');</style>
<link rel="stylesheet" href="ds/tokens.css">
<link rel="stylesheet" href="ds/components.css">
<style>
  .pricing-hero { padding: 80px 64px 48px; text-align: center; background: var(--surface); border-bottom: 1px solid var(--rule); }
  .pricing-hero h1 { font-size: var(--t-h1); font-weight: 600; letter-spacing: -0.025em; margin: 16px 0 12px; }
  .pricing-hero p { color: var(--ink-3); font-size: 17px; max-width: 56ch; margin: 0 auto; }
  .billing-toggle { display: inline-flex; background: var(--bg-subtle); border-radius: var(--r-pill); padding: 4px; margin-top: 24px; gap: 4px; }
  .billing-toggle button { font-family: var(--font-sans); font-size: 13px; font-weight: 500; padding: 8px 16px; border: none; background: transparent; cursor: pointer; border-radius: var(--r-pill); color: var(--ink-3); }
  .billing-toggle button.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-1); }
  .billing-save { font-family: var(--font-mono); font-size: 11px; color: var(--ok); margin-left: 6px; }
  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 1200px; margin: -32px auto 64px; padding: 0 64px; }
  .plan { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--r-lg); padding: 32px; display: flex; flex-direction: column; gap: 20px; position: relative; }
  .plan.featured { border-color: var(--petrol-500); box-shadow: var(--shadow-2); }
  .plan-tag { position: absolute; top: -10px; left: 24px; background: var(--petrol-500); color: #fff; font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 10px; border-radius: var(--r-xs); }
  .plan-name { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--petrol-500); }
  .plan-price { display: flex; align-items: baseline; gap: 6px; }
  .plan-price .v { font-size: 44px; font-weight: 600; letter-spacing: -0.025em; line-height: 1; font-variant-numeric: tabular-nums; }
  .plan-price .p { font-size: 14px; color: var(--ink-3); }
  .plan-desc { font-size: 14px; color: var(--ink-3); line-height: 1.55; min-height: 60px; }
  .plan-features { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; padding-top: 20px; border-top: 1px solid var(--rule); }
  .plan-features li { font-size: 13px; color: var(--ink-2); display: flex; gap: 10px; align-items: flex-start; }
  .plan-features li svg { color: var(--petrol-500); flex-shrink: 0; margin-top: 2px; }
  .plan-features li.muted { color: var(--ink-4); text-decoration: line-through; }
  .plan-features li.muted svg { color: var(--ink-4); }
  .compare { max-width: 1200px; margin: 0 auto 64px; padding: 0 64px; }
  .compare h2 { font-size: var(--t-h2); font-weight: 600; letter-spacing: -0.02em; margin: 0 0 24px; }
  .compare table { width: 100%; }
  .compare th { text-align: left; padding: 14px 16px; font-size: 12px; }
  .compare td { padding: 14px 16px; }
  .compare .cat { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); padding-top: 24px; }
  .faq { max-width: 760px; margin: 0 auto 96px; padding: 0 64px; }
  .faq h2 { font-size: var(--t-h2); font-weight: 600; letter-spacing: -0.02em; margin: 0 0 24px; }
  .faq-item { padding: 20px 0; border-top: 1px solid var(--rule); }
  .faq-item:last-child { border-bottom: 1px solid var(--rule); }
  .faq-q { font-weight: 600; font-size: 16px; margin: 0 0 8px; }
  .faq-a { color: var(--ink-3); font-size: 14px; margin: 0; line-height: 1.6; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ds/icons.jsx"></script>
<script type="text/babel" src="ds/shell.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState } = React;

function Plan({ name, price, period, desc, features, cta, ctaPrimary, featured }) {
  return (
    <div className={`plan ${featured ? 'featured' : ''}`}>
      {featured && <div className="plan-tag">Recomendado</div>}
      <div className="plan-name">{name}</div>
      <div className="plan-price"><span className="v">{price}</span><span className="p">{period}</span></div>
      <div className="plan-desc">{desc}</div>
      <button className={`btn ${ctaPrimary ? 'btn-primary' : 'btn-secondary'} btn-lg`} style={{ width: '100%', justifyContent: 'center' }}>{cta}</button>
      <ul className="plan-features">
        {features.map((f, i) => (
          <li key={i} className={f.off ? 'muted' : ''}>
            <Icon name={f.off ? 'x' : 'check'} />
            {f.label}
          </li>
        ))}
      </ul>
    </div>
  );
}

function App() {
  const [yearly, setYearly] = useState(true);
  const mult = yearly ? 0.8 : 1;
  return (
    <>
      <PublicNav active="pricing" />
      <section className="pricing-hero">
        <div className="eyebrow">Planos · 2026</div>
        <h1>Escolha como sua farmácia opera.</h1>
        <p>Todos os planos incluem PDV, manipulação, rotulagem e suporte por chat. Sem add-ons, sem upgrade só pra ter relatório.</p>
        <div className="billing-toggle">
          <button className={!yearly ? 'active' : ''} onClick={() => setYearly(false)}>Mensal</button>
          <button className={yearly ? 'active' : ''} onClick={() => setYearly(true)}>Anual<span className="billing-save">−20%</span></button>
        </div>
      </section>

      <div className="pricing-grid">
        <Plan
          name="Essencial"
          price={`R$ ${Math.round(189 * mult)}`}
          period="/mês"
          desc="Para farmácias começando a digitalizar a manipulação."
          cta="Começar grátis"
          features={[
            { label: 'Até 200 fórmulas/mês' },
            { label: '1 ponto de venda' },
            { label: 'Rotulagem padrão' },
            { label: 'Suporte por chat' },
            { label: 'Pesagem integrada', off: true },
            { label: 'Rotulagem controlada (Anvisa)', off: true },
            { label: 'OCR de receita', off: true },
          ]}
        />
        <Plan
          name="Profissional"
          price={`R$ ${Math.round(389 * mult)}`}
          period="/mês"
          desc="Para operações com manipulação controlada e múltiplos farmacêuticos."
          cta="Escolher Profissional"
          ctaPrimary
          featured
          features={[
            { label: 'Fórmulas ilimitadas' },
            { label: '3 pontos de venda' },
            { label: 'Rotulagem padrão e controlada' },
            { label: 'OCR de receita · pesagem' },
            { label: 'Estoque por lote e validade' },
            { label: 'Suporte prioritário' },
            { label: 'Migração de dados gratuita' },
          ]}
        />
        <Plan
          name="Rede"
          price="Sob consulta"
          period=""
          desc="Para redes de manipulação com múltiplas unidades."
          cta="Falar com vendas"
          features={[
            { label: 'Multi-unidade · consolidado' },
            { label: 'PDV ilimitado' },
            { label: 'SLA dedicado · 99,9%' },
            { label: 'Integrações sob medida' },
            { label: 'SSO · auditoria' },
            { label: 'Onboarding presencial' },
            { label: 'Gerente de conta dedicado' },
          ]}
        />
      </div>

      <section className="compare">
        <h2>Comparação detalhada</h2>
        <div className="table-wrap">
          <table className="table">
            <thead><tr><th></th><th>Essencial</th><th>Profissional</th><th>Rede</th></tr></thead>
            <tbody>
              <tr><td className="cat" colSpan="4">Manipulação</td></tr>
              <tr><td>Fórmulas/mês</td><td>200</td><td>Ilimitado</td><td>Ilimitado</td></tr>
              <tr><td>Pesagem integrada (balança serial)</td><td><Icon name="x" style={{color:'var(--ink-4)'}}/></td><td><Icon name="check" style={{color:'var(--petrol-500)'}}/></td><td><Icon name="check" style={{color:'var(--petrol-500)'}}/></td></tr>
              <tr><td>OCR de receita</td><td><Icon name="x" style={{color:'var(--ink-4)'}}/></td><td><Icon name="check" style={{color:'var(--petrol-500)'}}/></td><td><Icon name="check" style={{color:'var(--petrol-500)'}}/></td></tr>
              <tr><td>Rotulagem controlada (Anvisa)</td><td><Icon name="x" style={{color:'var(--ink-4)'}}/></td><td><Icon name="check" style={{color:'var(--petrol-500)'}}/></td><td><Icon name="check" style={{color:'var(--petrol-500)'}}/></td></tr>
              <tr><td className="cat" colSpan="4">Vendas</td></tr>
              <tr><td>Pontos de venda</td><td>1</td><td>3</td><td>Ilimitado</td></tr>
              <tr><td>NFC-e · TEF</td><td><Icon name="check" style={{color:'var(--petrol-500)'}}/></td><td><Icon name="check" style={{color:'var(--petrol-500)'}}/></td><td><Icon name="check" style={{color:'var(--petrol-500)'}}/></td></tr>
              <tr><td>Convênios e fidelidade</td><td><Icon name="x" style={{color:'var(--ink-4)'}}/></td><td><Icon name="check" style={{color:'var(--petrol-500)'}}/></td><td><Icon name="check" style={{color:'var(--petrol-500)'}}/></td></tr>
              <tr><td className="cat" colSpan="4">Equipe e segurança</td></tr>
              <tr><td>Usuários</td><td>3</td><td>15</td><td>Ilimitado</td></tr>
              <tr><td>SSO (Google/Microsoft)</td><td><Icon name="x" style={{color:'var(--ink-4)'}}/></td><td><Icon name="x" style={{color:'var(--ink-4)'}}/></td><td><Icon name="check" style={{color:'var(--petrol-500)'}}/></td></tr>
              <tr><td>Suporte</td><td>Chat</td><td>Chat prioritário</td><td>SLA dedicado</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section className="faq">
        <h2>Perguntas frequentes</h2>
        <div className="faq-item"><h4 className="faq-q">Posso trocar de plano depois?</h4><p className="faq-a">Sim, a qualquer momento. Trocas para um plano superior são proporcionais ao período restante; para inferiores, o crédito fica disponível para o próximo ciclo.</p></div>
        <div className="faq-item"><h4 className="faq-q">A migração dos meus dados é gratuita?</h4><p className="faq-a">Sim, no plano Profissional e Rede. Trabalhamos com planilhas, exportações de outros sistemas e até bases SQL. O processo leva em média 5 dias úteis.</p></div>
        <div className="faq-item"><h4 className="faq-q">O sistema atende exigências da Anvisa?</h4><p className="faq-a">Sim. Rotulagem padrão e controlada (faixa preta para psicotrópicos, vermelha para entorpecentes), livros eletrônicos, rastreabilidade por lote e SNGPC integrado.</p></div>
        <div className="faq-item"><h4 className="faq-q">Funciona com minha balança?</h4><p className="faq-a">Trabalhamos com qualquer balança que tenha porta serial RS-232 ou USB-serial. Lista completa de modelos testados na documentação.</p></div>
        <div className="faq-item"><h4 className="faq-q">E se eu cancelar?</h4><p className="faq-a">Sem multa, sem fidelidade. Exportamos todos os seus dados em CSV e PDF, e mantemos a conta arquivada por 6 meses caso queira voltar.</p></div>
      </section>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
