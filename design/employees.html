<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>OrcPharm — Equipe</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>@import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap');</style>
<link rel="stylesheet" href="ds/tokens.css">
<link rel="stylesheet" href="ds/components.css">
<style>
  .role-tabs { display: flex; gap: 4px; padding: 4px; background: var(--bg-subtle); border-radius: var(--r-pill); width: fit-content; margin-bottom: 16px; }
  .role-tabs button { font-size: 12px; padding: 6px 14px; border: none; background: transparent; border-radius: var(--r-pill); cursor: pointer; color: var(--ink-3); font-weight: 500; }
  .role-tabs button.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-1); }
  .emp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .emp-card { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--r-md); padding: 20px; display: flex; flex-direction: column; gap: 14px; position: relative; }
  .emp-head { display: flex; gap: 12px; align-items: center; }
  .emp-avatar { width: 48px; height: 48px; border-radius: 50%; display: grid; place-items: center; font-weight: 600; font-size: 16px; flex-shrink: 0; }
  .emp-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .emp-role { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
  .emp-status { position: absolute; top: 16px; right: 16px; }
  .emp-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); display: inline-block; margin-right: 6px; vertical-align: middle; }
  .emp-status.away .dot { background: var(--ink-4); }
  .emp-meta { display: flex; flex-direction: column; gap: 6px; padding: 12px 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
  .emp-meta-row { display: flex; justify-content: space-between; font-size: 12px; }
  .emp-meta-row .l { color: var(--ink-3); }
  .emp-meta-row .v { font-family: var(--font-mono); color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .emp-perms { display: flex; flex-wrap: wrap; gap: 4px; }
  .perm-chip { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; background: var(--bg-subtle); color: var(--ink-2); }
  .perm-chip.crit { background: var(--warn-soft); color: var(--warn); }
  .emp-actions { display: flex; gap: 6px; margin-top: auto; }
  .add-card { background: var(--surface); border: 1.5px dashed var(--rule); border-radius: var(--r-md); padding: 32px; display: grid; place-items: center; cursor: pointer; min-height: 200px; }
  .add-card:hover { border-color: var(--petrol-500); color: var(--petrol-500); }
  .add-card .icon-circle { width: 48px; height: 48px; border-radius: 50%; background: var(--petrol-50); color: var(--petrol-500); display: grid; place-items: center; margin-bottom: 12px; }
  .add-card div { text-align: center; }
  .add-card .label { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
  .add-card .hint { font-size: 12px; color: var(--ink-3); }
  .activity-card { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--r-md); }
  .activity-row { padding: 12px 20px; border-bottom: 1px solid var(--rule); display: grid; grid-template-columns: 60px 32px 1fr auto; gap: 12px; align-items: center; }
  .activity-row:last-child { border-bottom: none; }
  .activity-row .time { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
  .activity-row .av { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; font-weight: 600; color: #fff; }
  .activity-row .text { font-size: 13px; color: var(--ink-2); }
  .activity-row .text b { color: var(--ink); font-weight: 500; }
  .activity-row .role { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.04em; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ds/icons.jsx"></script>
<script type="text/babel" src="ds/shell.jsx"></script>
<script type="text/babel" data-presets="react">
const COLORS = ['#0F6E78', '#3D6CFF', '#FF8E2B', '#7A6BFF', '#0EA5A5', '#FF6B6B'];
const TEAM = [
  { name:'Douglas Braga', role:'Farmacêutico RT', initials:'DB', crf:'CRF/SP 12345', login:'há 4 min', orders:'14 hoje', perms:['Liberação','Controlados','Caixa','Compras'], status:'online' },
  { name:'Renata Tavares', role:'Farmacêutica', initials:'RT', crf:'CRF/SP 23456', login:'há 12 min', orders:'8 hoje', perms:['Liberação','Manipulação','Caixa'], status:'online' },
  { name:'Joana Lima', role:'Manipuladora', initials:'JL', crf:'—', login:'há 28 min', orders:'12 hoje', perms:['Pesagem','Manipulação'], status:'online' },
  { name:'Pedro Silva', role:'Atendente', initials:'PS', crf:'—', login:'há 1h', orders:'34 vendas', perms:['Caixa','Convênios'], status:'online' },
  { name:'Marina Costa', role:'Manipuladora', initials:'MC', crf:'—', login:'ontem', orders:'—', perms:['Pesagem','Manipulação'], status:'away' },
  { name:'Lucas Andrade', role:'Estagiário', initials:'LA', crf:'estagiário CRF/SP', login:'há 2h', orders:'6 hoje', perms:['Pesagem'], status:'online' },
];

function App() {
  return (
    <div className="app-shell">
      <Sidebar active="employees" />
      <div className="app-main">
        <Topbar />
        <div className="app-content">
          <PageHead
            breadcrumb="SISTEMA · EQUIPE"
            title="Equipe"
            subtitle="6 membros ativos · 2 farmacêuticos com CRF · permissões por função."
            actions={<>
              <button className="btn btn-secondary"><Icon name="archive"/>Auditoria</button>
              <button className="btn btn-primary"><Icon name="plus"/>Convidar membro</button>
            </>}
          />

          <div className="role-tabs">
            <button className="active">Todos<span style={{fontFamily:'var(--font-mono)', fontSize:11, marginLeft:6, opacity:.5}}>6</span></button>
            <button>Farmacêuticos<span style={{fontFamily:'var(--font-mono)', fontSize:11, marginLeft:6, opacity:.5}}>2</span></button>
            <button>Manipuladores<span style={{fontFamily:'var(--font-mono)', fontSize:11, marginLeft:6, opacity:.5}}>2</span></button>
            <button>Atendentes<span style={{fontFamily:'var(--font-mono)', fontSize:11, marginLeft:6, opacity:.5}}>1</span></button>
            <button>Estagiários<span style={{fontFamily:'var(--font-mono)', fontSize:11, marginLeft:6, opacity:.5}}>1</span></button>
          </div>

          <div className="emp-grid">
            {TEAM.map((p, i) => (
              <div className="emp-card" key={i}>
                <div className={`emp-status ${p.status}`}><span className="dot"/><span style={{fontSize:11, color:'var(--ink-3)', fontFamily:'var(--font-mono)', textTransform:'uppercase', letterSpacing:'.06em'}}>{p.status === 'online' ? 'Online' : 'Ausente'}</span></div>
                <div className="emp-head">
                  <div className="emp-avatar" style={{background:`color-mix(in oklch, ${COLORS[i % COLORS.length]} 18%, var(--bg))`, color: COLORS[i % COLORS.length]}}>{p.initials}</div>
                  <div>
                    <div className="emp-name">{p.name}</div>
                    <div className="emp-role">{p.role}{p.crf !== '—' && ` · ${p.crf}`}</div>
                  </div>
                </div>
                <div className="emp-meta">
                  <div className="emp-meta-row"><span className="l">Último acesso</span><span className="v">{p.login}</span></div>
                  <div className="emp-meta-row"><span className="l">Atividade</span><span className="v">{p.orders}</span></div>
                </div>
                <div>
                  <div style={{fontSize:11, fontFamily:'var(--font-mono)', textTransform:'uppercase', letterSpacing:'.06em', color:'var(--ink-3)', marginBottom:8}}>Permissões</div>
                  <div className="emp-perms">
                    {p.perms.map(perm => <span key={perm} className={`perm-chip ${perm === 'Controlados' ? 'crit' : ''}`}>{perm}</span>)}
                  </div>
                </div>
                <div className="emp-actions">
                  <button className="btn btn-secondary btn-sm" style={{flex:1, justifyContent:'center'}}><Icon name="edit"/>Editar</button>
                  <button className="btn btn-ghost btn-sm"><Icon name="menu-dots"/></button>
                </div>
              </div>
            ))}
            <div className="add-card">
              <div>
                <div className="icon-circle"><Icon name="plus" size={20}/></div>
                <div className="label">Convidar membro</div>
                <div className="hint">Por e-mail ou link</div>
              </div>
            </div>
          </div>

          <div className="card-header" style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
            <h3 style={{margin:0, fontSize:15, fontWeight:600, letterSpacing:'-0.015em'}}>Auditoria · últimas 24h</h3>
            <a href="#" className="btn btn-ghost btn-sm">Ver tudo<Icon name="arrow-right"/></a>
          </div>
          <div className="activity-card">
            <div className="activity-row">
              <span className="time">14:38</span>
              <span className="av" style={{background:COLORS[0]}}>DB</span>
              <span className="text"><b>Douglas Braga</b> liberou ORD-1183 (Minoxidil 5%)</span>
              <span className="role">RT</span>
            </div>
            <div className="activity-row">
              <span className="time">14:31</span>
              <span className="av" style={{background:COLORS[1]}}>RT</span>
              <span className="text"><b>Renata Tavares</b> aprovou 1ª assinatura ORD-1182 (controlado)</span>
              <span className="role">Farm.</span>
            </div>
            <div className="activity-row">
              <span className="time">14:18</span>
              <span className="av" style={{background:COLORS[2]}}>JL</span>
              <span className="text"><b>Joana Lima</b> concluiu pesagem · bancada 02 · ORD-1182</span>
              <span className="role">Manip.</span>
            </div>
            <div className="activity-row">
              <span className="time">13:55</span>
              <span className="av" style={{background:COLORS[0]}}>DB</span>
              <span className="text"><b>Douglas Braga</b> alterou estoque mínimo de Tretinoína 0,025% (3 → 5 frascos)</span>
              <span className="role">Adm.</span>
            </div>
            <div className="activity-row">
              <span className="time">13:42</span>
              <span className="av" style={{background:COLORS[3]}}>PS</span>
              <span className="text"><b>Pedro Silva</b> finalizou venda · NFC-e 4521 · R$ 227,43</span>
              <span className="role">PDV</span>
            </div>
            <div className="activity-row">
              <span className="time">12:08</span>
              <span className="av" style={{background:COLORS[5]}}>LA</span>
              <span className="text"><b>Lucas Andrade</b> tentou liberar pedido (sem permissão)</span>
              <span className="role" style={{color:'var(--warn)'}}>Bloq.</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
