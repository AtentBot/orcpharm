<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Farmify — Manipulação</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 88 88'><rect width='88' height='88' rx='18' fill='%230F6E78'/><path d='M30 26 H42 a10 10 0 0 1 10 10 V52 H42 a10 10 0 0 1 -10 -10 V26 Z' fill='white'/><rect x='52' y='26' width='14' height='8' rx='4' fill='white'/><rect x='52' y='38' width='10' height='7' rx='3.5' fill='white'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>@import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@500,700,800&display=swap');</style>
<link rel="stylesheet" href="ds/tokens.css">
<link rel="stylesheet" href="ds/components.css">
<style>
  .manip-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
  .formula-card { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--r-md); }
  .formula-head { padding: 16px 20px; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; }
  .formula-head h2 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.015em; }
  .formula-head .meta { display: flex; gap: 20px; align-items: center; font-size: 12px; color: var(--ink-3); margin-top: 4px; }
  .formula-head .meta span { display: inline-flex; gap: 6px; align-items: center; }
  .formula-head .meta b { color: var(--ink-2); font-weight: 500; }
  .step-rail { display: flex; padding: 14px 20px; gap: 4px; border-bottom: 1px solid var(--rule); background: var(--bg-subtle); }
  .step-rail .s { flex: 1; padding: 8px 12px; border-radius: var(--r-sm); font-size: 12px; font-weight: 500; color: var(--ink-3); display: flex; align-items: center; gap: 8px; }
  .step-rail .s.done { color: var(--ok); }
  .step-rail .s.active { background: var(--surface); color: var(--ink); border: 1px solid var(--rule); }
  .step-rail .s .num { font-family: var(--font-mono); font-size: 10px; opacity: 0.6; }
  .form-section { padding: 20px; border-bottom: 1px solid var(--rule); }
  .form-section:last-child { border-bottom: none; }
  .section-title { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); margin-bottom: 12px; }
  .ingredients-table { width: 100%; }
  .ingredients-table th { font-size: 11px; padding: 8px 12px; }
  .ingredients-table td { padding: 12px; border-bottom: 1px solid var(--rule); font-size: 13px; vertical-align: middle; }
  .ingredients-table .ing-name { font-weight: 500; color: var(--ink); }
  .ingredients-table .ing-meta { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .ingredients-table .qty-input { width: 90px; padding: 6px 8px; text-align: right; font-family: var(--font-mono); }
  .stock-pill { font-size: 11px; padding: 2px 6px; border-radius: 3px; font-family: var(--font-mono); display: inline-flex; align-items: center; gap: 4px; }
  .stock-pill.ok { background: var(--ok-soft); color: var(--ok); }
  .stock-pill.low { background: var(--warn-soft); color: var(--warn); }
  .stock-pill.out { background: var(--danger-soft); color: var(--danger); }
  .add-ingredient { padding: 10px 12px; background: var(--bg-subtle); border-radius: var(--r-sm); margin-top: 12px; font-size: 13px; color: var(--petrol-500); border: 1px dashed var(--rule); cursor: pointer; display: flex; align-items: center; gap: 8px; justify-content: center; }
  .veh-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .summary-card { padding: 20px; }
  .summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; }
  .summary-row .lbl { color: var(--ink-3); }
  .summary-row .val { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--ink); }
  .summary-row.total { border-top: 1px solid var(--rule); padding-top: 14px; margin-top: 8px; }
  .summary-row.total .lbl { font-weight: 600; color: var(--ink); font-family: var(--font-sans); }
  .summary-row.total .val { font-size: 18px; font-weight: 600; color: var(--ink); }
  .alert-card { padding: 14px 16px; background: var(--warn-soft); border: 1px solid color-mix(in oklch, var(--warn) 30%, transparent); border-radius: var(--r-sm); display: flex; gap: 10px; font-size: 13px; color: var(--ink-2); align-items: flex-start; }
  .alert-card svg { color: var(--warn); flex-shrink: 0; margin-top: 1px; }
  .alert-card b { color: var(--ink); }
  .label-preview { background: #fff; border: 1px solid var(--rule); border-radius: var(--r-sm); padding: 14px; font-size: 11px; line-height: 1.45; color: var(--ink); }
  .label-preview .strip { background: var(--controlled-black); color: #fff; padding: 4px 8px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; margin: -14px -14px 12px; }
  .label-preview h3 { font-size: 13px; font-weight: 600; margin: 0 0 8px; }
  .label-preview .row { display: flex; justify-content: space-between; padding: 2px 0; gap: 8px; }
  .label-preview .row .l { color: var(--ink-3); }
  .label-preview .small { font-size: 9px; color: var(--ink-3); margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--rule); }
  .preview-block { padding: 20px; }
  .formula-actions { padding: 16px 20px; display: flex; gap: 8px; justify-content: space-between; background: var(--bg-subtle); border-top: 1px solid var(--rule); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ds/icons.jsx"></script>
<script type="text/babel" src="ds/shell.jsx"></script>

</html>
