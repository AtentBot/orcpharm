<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Farmify — Entrar</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 88 88'><rect width='88' height='88' rx='18' fill='%230F6E78'/><path d='M30 26 H42 a10 10 0 0 1 10 10 V52 H42 a10 10 0 0 1 -10 -10 V26 Z' fill='white'/><rect x='52' y='26' width='14' height='8' rx='4' fill='white'/><rect x='52' y='38' width='10' height='7' rx='3.5' fill='white'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>@import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@500,700,800&display=swap');</style>
<link rel="stylesheet" href="ds/tokens.css">
<link rel="stylesheet" href="ds/components.css">
<style>
  body { background: var(--bg); }
  .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
  .login-card { width: 100%; max-width: 420px; }
  .login-card .brand-block { text-align: center; margin-bottom: 32px; }
  .login-card h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.025em; margin: 0 0 8px; text-align: center; }
  .login-card .sub { color: var(--ink-3); font-size: 14px; margin: 0 0 32px; text-align: center; }
  .login-form { background: var(--surface); border: 1px solid var(--rule); border-radius: var(--r-md); padding: 32px; box-shadow: var(--shadow-1); display: flex; flex-direction: column; gap: 16px; }
  .form-actions-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .form-actions-row label { display: flex; gap: 8px; align-items: center; color: var(--ink-2); cursor: pointer; }
  .form-actions-row a { color: var(--petrol-500); text-decoration: none; }
  .divider-row { display: flex; align-items: center; gap: 12px; color: var(--ink-4); font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; }
  .divider-row::before, .divider-row::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
  .sso-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .sso-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; background: var(--surface); border: 1px solid var(--rule); border-radius: var(--r-sm); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--ink); }
  .sso-btn:hover { background: var(--bg-subtle); }
  .login-footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--ink-3); }
  .login-footer a { color: var(--petrol-500); text-decoration: none; font-weight: 500; }
  .compliance { text-align: center; margin-top: 32px; color: var(--ink-4); font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; display: flex; gap: 16px; justify-content: center; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ds/icons.jsx"></script>
<script type="text/babel" src="ds/shell.jsx"></script>
<script type="text/babel" data-presets="react">
function App() {
  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="brand-block"><Brand size="lg"/></div>
        <h1>Bem-vindo de volta.</h1>
        <p className="sub">Entre na sua farmácia.</p>
        <form className="login-form" onSubmit={e=>{e.preventDefault();window.location='dashboard.html'}}>
          <div>
            <label className="input-label">E-mail</label>
            <input className="input" type="email" placeholder="voce@farmacia.com.br" defaultValue="douglas@farmaciavita.com.br"/>
          </div>
          <div>
            <label className="input-label">Senha</label>
            <input className="input" type="password" placeholder="••••••••••" defaultValue="senha-de-exemplo"/>
          </div>
          <div className="form-actions-row">
            <label><input type="checkbox" defaultChecked/>Manter conectado</label>
            <a href="#">Esqueci minha senha</a>
          </div>
          <button type="submit" className="btn btn-primary btn-lg" style={{justifyContent:'center'}}>Entrar<Icon name="arrow-right"/></button>
          <div className="divider-row">ou continue com</div>
          <div className="sso-grid">
            <button type="button" className="sso-btn"><svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.2c0-.7-.1-1.4-.2-2H12v3.9h5.9c-.3 1.4-1 2.5-2.2 3.3v2.7h3.5c2.1-1.9 3.3-4.7 3.3-7.9z"/><path fill="#34A853" d="M12 23c3 0 5.5-1 7.3-2.7l-3.5-2.7c-1 .7-2.2 1-3.8 1-2.9 0-5.4-2-6.3-4.6H2.1v2.9C3.9 20.5 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.7 14c-.2-.7-.3-1.4-.3-2s.1-1.4.3-2v-3H2.1C1.4 8.5 1 10.2 1 12s.4 3.5 1.1 5l3.6-3z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3.1.6 4.2 1.7l3.1-3.1C17.5 2.2 15 1 12 1 7.7 1 3.9 3.5 2.1 7l3.6 3c.9-2.6 3.4-4.6 6.3-4.6z"/></svg>Google</button>
            <button type="button" className="sso-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="#0078D4"><path d="M11.4 11.4H1V1h10.4v10.4zM23 11.4H12.6V1H23v10.4zM11.4 23H1V12.6h10.4V23zM23 23H12.6V12.6H23V23z"/></svg>Microsoft</button>
          </div>
        </form>
        <div className="login-footer">
          Não tem conta ainda? <a href="signup.html">Criar conta grátis</a>
        </div>
        <div className="compliance">
          <span>LGPD</span><span>Anvisa</span><span>SNGPC</span>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
